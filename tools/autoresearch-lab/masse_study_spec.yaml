# Gen 1 editable surface (the only file the Experimenter edits)
# This file defines MASSE modeling defaults and tunable knobs.
# The harness reads this and produces the benchmark jobs.

version: "0.1"

meta:
  description: "MASSE Autoresearch Lab study spec"

solver:
  # Defaults tuned for OpenSees-style nonlinear static and eigen.
  constraints: "Transformation" # Plain | Transformation | Penalty | Lagrange
  numberer: "Plain"          # RCM | Plain
  system: "BandGeneral"      # UmfPack | BandGeneral | SparseSYM
  test:
    name: "NormDispIncr"      # NormDispIncr | NormUnbalance | EnergyIncr
    tol: 1.0e-6
    maxIter: 30
  algorithm:
    name: "Newton"            # Newton | ModifiedNewton | KrylovNewton | NewtonLineSearch
  integrator:
    # For static: LoadControl or DisplacementControl per case
    defaultStatic: "LoadControl"
  analysis:
    static: "Static"

stability:
  pDelta:
    enabledByDefault: true
    geomTransf2D: "PDelta"     # PDelta | Linear
    geomTransf3D: "PDelta"

mass:
  model: "lumped_floor_nodes" # lumped_floor_nodes | consistent | custom

damping:
  # Start simple. Later experiments can introduce Rayleigh target modes.
  model: "rayleigh"
  zeta: 0.02
  rayleigh:
    targetModes: [1, 3]
    # If the harness supports it, compute a0/a1 from target modes.

diaphragm:
  defaultMode: "rigid"         # rigid | semi_rigid
  rigid:
    method: "rigid_constraint" # rigid_constraint | rigid_link
  semi_rigid:
    method: "membrane_shell"   # membrane_shell | equivalent_springs
    effectiveStiffnessFactor: 1.0

elements:
  beamColumnType: "elasticBeamColumn" # elasticBeamColumn | forceBeamColumn
  # Placeholder knobs for later experiment families
  plasticity:
    enabled: false

output:
  recorders:
    drifts: true
    reactions: true
    elementForces: false

caps:
  perCaseSeconds: 180
  suiteSeconds: 600
  maxRetries: 2
